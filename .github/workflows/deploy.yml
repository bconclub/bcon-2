name: Deploy to Production

on:
  push:
    branches: [ production ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Auto-increment version on production push
        if: github.event_name == 'push' && github.ref == 'refs/heads/production' && !contains(github.event.head_commit.message, '[skip version]')
        run: |
          # Skip if this is already a version bump commit to avoid infinite loops
          if [[ "${{ github.event.head_commit.message }}" == *"[skip ci]"* ]] || [[ "${{ github.event.head_commit.message }}" == *"chore: auto-increment version"* ]]; then
            echo "⏭️ Skipping version bump - this is already a version update commit"
            exit 0
          fi
          
          # Get current version
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT_VERSION"
          
          # Parse version (format: MAJOR.MINOR.PATCH)
          IFS='.' read -r -a version_parts <<< "$CURRENT_VERSION"
          MAJOR=${version_parts[0]}
          MINOR=${version_parts[1]}
          PATCH=${version_parts[2]:-0}
          
          # Increment minor version (e.g., 1.11 -> 1.12)
          NEW_MINOR=$((MINOR + 1))
          NEW_VERSION="$MAJOR.$NEW_MINOR.0"
          
          echo "New version: $NEW_VERSION"
          
          # Update package.json version
          npm version $NEW_VERSION --no-git-tag-version
          
          # Commit version change and push back to trigger deployment with new version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: auto-increment version to $NEW_VERSION [skip ci]" || exit 0
          git push origin production || exit 0
          
          echo "✅ Version updated to $NEW_VERSION and pushed to production"

      - name: Create deployment package
        run: |
          # Create package with source files (build will happen on VPS)
          mkdir -p deploy
          # Copy source directories and config files
          cp -r app components sections lib public effects types deploy/
          cp next.config.js tsconfig.json package.json package-lock.json ecosystem.config.js deploy/
          # Create tarball
          tar -czf deploy.tar.gz -C deploy .

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_DEPLOY_KEY }}
          source: "deploy.tar.gz"
          target: "/tmp/"
          port: 22
          timeout: 60s
          command_timeout: 120s
          debug: true

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_DEPLOY_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 300s
          debug: true
          script: |
            set -e  # Exit immediately if any command fails
            
            cd /var/www/bconclub
            
            # Extract deployment package
            echo "📦 Extracting deployment files..."
            tar -xzf /tmp/deploy.tar.gz -C /var/www/bconclub/ || { echo "❌ Failed to extract files"; exit 1; }
            rm /tmp/deploy.tar.gz
            
            # Verify .env.local exists (should already be there)
            if [ ! -f .env.local ]; then
              echo "⚠️ Warning: .env.local not found!"
            fi
            
            # Install production dependencies
            echo "📥 Installing dependencies..."
            npm ci || { echo "❌ npm install failed"; exit 1; }
            
            # Build - CRITICAL: stop if this fails
            echo "🔨 Building application..."
            npm run build || { echo "❌ Build failed"; exit 1; }
            
            # Only restart if build succeeded
            echo "🔄 Restarting PM2..."
            if pm2 describe bconclub > /dev/null 2>&1; then
              pm2 restart bconclub
            else
              pm2 start ecosystem.config.js
            fi
            
            pm2 save
            
            echo "✅ Deployment complete!"